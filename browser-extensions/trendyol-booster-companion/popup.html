<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZOLM Booster</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font: 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { padding: 14px; }
    h1 { margin: 0; font-size: 16px; }
    p { margin: 6px 0 0; color: #64748b; line-height: 1.45; }
    label { display: block; margin-top: 14px; font-size: 12px; font-weight: 700; color: #475569; }
    input {
      box-sizing: border-box;
      width: 100%;
      min-height: 38px;
      margin-top: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      color: #0f172a;
      font: inherit;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    button {
      min-height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      color: #334155;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    button.primary { border-color: #0f172a; background: #0f172a; color: #fff; }
    .status {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      color: #475569;
    }
    .page {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .page-title { font-size: 12px; font-weight: 800; color: #0f172a; }
    .page-meta { margin-top: 5px; font-size: 12px; line-height: 1.45; color: #64748b; }
    .pill {
      display: inline-flex;
      margin-top: 8px;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      background: #f0fdf4;
      padding: 3px 6px;
      color: #047857;
      font-size: 11px;
      font-weight: 700;
    }
    .pill.warn { border-color: #fed7aa; background: #fff7ed; color: #c2410c; }
    .ok { border-color: #bbf7d0; background: #f0fdf4; color: #047857; }
    .err { border-color: #fecdd3; background: #fff1f2; color: #be123c; }
  </style>
</head>
<body>
  <main>
    <h1>ZOLM Booster</h1>
    <p>Trendyol ürün sayfasından fiyat/stok, mağaza sayfasından rakip ürün verisini ZOLM Booster'a gönderir.</p>

    <label for="baseUrl">ZOLM adresi</label>
    <input id="baseUrl" type="url" placeholder="http://localhost">

    <div class="actions">
      <button id="save" class="primary" type="button">Kaydet</button>
      <button id="test" type="button">Oturumu test et</button>
    </div>

    <div id="status" class="status">Hazır</div>

    <div class="page">
      <div class="page-title">Aktif Trendyol sayfası</div>
      <div id="pageMeta" class="page-meta">Kontrol ediliyor...</div>
      <span id="pagePill" class="pill warn">Bekleniyor</span>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
