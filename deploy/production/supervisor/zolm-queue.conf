[program:zolm-queue]
process_name=%(program_name)s_%(process_num)02d
directory=/var/www/zolm
command=/usr/bin/php artisan queue:work --queue=default --sleep=3 --tries=3 --timeout=1800 --max-time=3600 --memory=512
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/zolm/queue-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
stopwaitsecs=3600

